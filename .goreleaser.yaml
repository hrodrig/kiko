version: 2

project_name: kiko

before:
  hooks:
    - go vet ./...

builds:
  - id: kiko
    main: ./cmd/kiko
    binary: kiko
    ldflags:
      - -s -w
      - -X github.com/hrodrig/kiko/internal/version.Version={{ .Version }}
      - -X github.com/hrodrig/kiko/internal/version.Commit={{ .ShortCommit }}
      - -X github.com/hrodrig/kiko/internal/version.BuildDate={{ .Date }}
      - -X github.com/hrodrig/kiko/internal/version.Branch={{ .Branch }}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
      - freebsd
      - openbsd
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: default
    formats: ["tar.gz"]
    format_overrides:
      - goos: windows
        format: zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md
      - contrib/man/man1/kiko.1

checksum:
  name_template: "checksums.txt"

snapshot:
  name_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - '^ci:'

nfpms:
  - id: default
    package_name: kiko
    file_name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    vendor: Hermes Rodríguez
    homepage: https://github.com/hrodrig/kiko
    maintainer: Hermes J. Rodríguez Azuaje <hejeroaz@gmail.com>
    description: Privacy-first web analytics collector
    license: MIT
    formats:
      - deb
      - rpm
    contents:
      - src: ./contrib/systemd/kiko.service
        dst: /usr/lib/systemd/system/kiko.service
      - src: ./contrib/deb/prerm.sh
        dst: /usr/share/doc/kiko/prerm.sh
      - src: ./contrib/deb/postrm.sh
        dst: /usr/share/doc/kiko/postrm.sh
      - src: ./contrib/man/man1/kiko.1
        dst: /usr/share/man/man1/kiko.1

dockers_v2:
  - dockerfile: Dockerfile.release
    ids:
      - kiko
    images:
      - ghcr.io/hrodrig/kiko
    tags:
      - "v{{ .Version }}"
      - "{{ if not .IsSnapshot }}latest{{ end }}"
    labels:
      org.opencontainers.image.title: "kiko"
      org.opencontainers.image.description: "Privacy-first web analytics collector"
      org.opencontainers.image.source: "https://github.com/hrodrig/kiko"
      org.opencontainers.image.version: "{{ .Version }}"
      org.opencontainers.image.revision: "{{ .FullCommit }}"
      org.opencontainers.image.created: "{{ .Date }}"

homebrew_casks:
  - name: kiko
    ids:
      - kiko
    binaries:
      - kiko
    repository:
      owner: hrodrig
      name: homebrew-kiko
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Casks
    homepage: https://github.com/hrodrig/kiko
    description: "Privacy-first web analytics collector"
    license: MIT
    url:
      template: "https://github.com/hrodrig/kiko/releases/download/{{ .Tag }}/kiko_{{ .Tag }}_{{ .Os }}_{{ .Arch }}.tar.gz"
      verified: "github.com/hrodrig/kiko/"
    commit_author:
      name: Hermes Rodríguez
      email: hrodrig@usb.ve
    hooks:
      post:
        install: |
          system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/kiko"]
